################################################################################
# Standalone Crossbow/Filametrix Cutter Macro - "Snap Release" Edition
# Für Voron Trident (A4T)
################################################################################

[gcode_macro _CUT_TIP_VARS]
description: Variablen für den Filament-Cutter
gcode:

# Positions
variable_blade_pos              : 71
variable_retract_length         : 40
variable_pin_loc_xy             : 8, 340         # Lever touch Pin
variable_pin_backoff_dist       : -6.0          # Backoff before moving
variable_cut_park_pos           : 20, 335         # Safe park position before and after cut
variable_pin_loc_compressed_xy  : 8, 355         # Lever fully pressed position

# Filament moves
variable_rip_length             : 8           # Lift Filament from blade to give space
variable_rip_speed              : 3
variable_pushback_length        : 15.0          # Push filament rest back in Hot zone 
variable_extruder_move_speed    : 25

# Motion speeds
variable_travel_speed           : 150
variable_cut_fast_move_speed    : 32
variable_cut_slow_move_speed    : 8
variable_evacuate_speed         : 150

# Timing / Logic
variable_cut_dwell_time         : 50            # time after rip
variable_cut_fast_move_fraction : 1
variable_simple_tip_forming: 0                  # 1 = enable
variable_min_temp: 200

[gcode_macro CUT_FILAMENT]
description: Schneidet das Filament mit Snap-Release (Seitwärtsbewegung)
gcode:
    {% set vars = printer['gcode_macro _CUT_TIP_VARS'] %}
    {% set tip_distance = printer["gcode_macro _KAMP_Settings"].tip_distance | float %}

    {% set blade_pos               = vars.blade_pos|float %}
    {% set retract_length          = vars.retract_length|float %}
    {% set pin_loc_x, pin_loc_y    = vars.pin_loc_xy|map('float') %}
    {% set pin_backoff_dist        = vars.pin_backoff_dist|float %}
    {% set park_x, park_y          = vars.cut_park_pos|map('float') %}
    {% set pin_end_x, pin_end_y    = vars.pin_loc_compressed_xy|map('float') %}

    {% set rip_length              = vars.rip_length|float %}
    {% set rip_speed               = vars.rip_speed|float %}
    {% set pushback_length         = vars.pushback_length|float %}
    {% set extruder_move_speed     = vars.extruder_move_speed|float %}

    {% set travel_speed            = vars.travel_speed|float %}
    {% set cut_fast_speed          = vars.cut_fast_move_speed|float %}
    {% set cut_slow_speed          = vars.cut_slow_move_speed|float %}
    {% set evacuate_speed          = vars.evacuate_speed|float %}

    {% set cut_dwell_time          = vars.cut_dwell_time|int %}
    {% set cut_fast_fraction       = vars.cut_fast_move_fraction|float %}
    {% set simple_tip_forming      = vars.simple_tip_forming|int %}
    {% set min_temp                = vars.min_temp|int %}
    
    # Prüfungen (Safety First)
    {% if "xy" not in printer.toolhead.homed_axes %}
        {action_raise_error("Cutter Error: XY müssen gehomed sein!")}
    {% endif %}
    
    {% if printer.extruder.temperature < min_temp %}
        {action_raise_error("Cutter Error: Extruder Temperatur zu niedrig!")}
    {% endif %}

    SAVE_GCODE_STATE NAME=CUT_STATE
    G90 # Absolute Positionierung
    M83 # Relative Extrusion
    G92 E0

  # --- Step 1: Initial retract + simple tip forming ---
    {% set effective_retract_length = retract_length - tip_distance %}
    {% if effective_retract_length > 0 %}
        G1 E-{effective_retract_length} F{extruder_move_speed * 60}
        {% if simple_tip_forming %}
            G1 E{effective_retract_length / 2} F{extruder_move_speed * 60}
            G1 E-{effective_retract_length / 2} F{extruder_move_speed * 60}
        {% endif %}
    {% endif %}

    # --- Step 2: Pre-cut park ---
    G1 X{park_x} Y{park_y} F{travel_speed * 60}

    # --- Step 3: Move to pin contact (with backoff) ---
    {% set contact_y = pin_loc_y + pin_backoff_dist %}
    G1 X{pin_loc_x} Y{contact_y} F{travel_speed * 60}

    # --- Step 4: Cut motion ---
    {% set fast_slow_transition_y = (pin_end_y - contact_y) * cut_fast_fraction + contact_y %}

    G1 Y{fast_slow_transition_y} F{cut_fast_speed * 60}
    G1 Y{pin_end_y} F{cut_slow_speed * 60}

    G4 P{cut_dwell_time}

    # --- Step 5: Rip ---
    {% if rip_length > 0 %}
        G1 E-{rip_length} F{rip_speed * 60}
    {% endif %}

    # --- Step 6: Snap move (X first, then Y to park) ---
    G1 X{park_x} F{evacuate_speed * 60}
    G1 Y{park_y} F{evacuate_speed * 60}

    # --- Step 7: Push back ---
    {% if pushback_length > 0 %}
        G1 E{pushback_length} F{extruder_move_speed * 60}
        G1 E-{pushback_length} F{extruder_move_speed * 60}
    {% endif %}

    # -- Step 8: Filament auswerfen ---
	G92 E0
	G0 E-80 F1500
	M400
    
    # --- Step 9: Restore state ---
    RESTORE_GCODE_STATE NAME=CUT_STATE MOVE=1