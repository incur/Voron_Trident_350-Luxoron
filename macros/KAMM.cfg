#####################################################################
# KAMM - Klipper Automated Mop Macro (Nozzle Scrubbing)
#
# This macro executes nozzle cleaning routines based on
# a dynamic bounding box. It automatically calculates orientation
# (horizontal/vertical) and trajectory, allowing for adaptive
# patterns within the defined zone.
#####################################################################

[gcode_macro _KAMM_Variables]
description: Configuration variables for the KAMM nozzle scrubbing macro
# --- Coordinates ---
variable_brush_start_x:       147       # Start Point: The entry point of the brush.
variable_brush_start_y:       350       # Ideally the corner closest to the purge bucket or toolhead position.
variable_brush_end_x:         181       # End Point: The diagonally opposite corner of the brush.
variable_brush_end_y:         357       # Used to calculate the bounding box and direction.

# --- Heights ---
variable_brush_z:             3.0       # Z-Height during the scrubbing process (nozzle inside the brush)
variable_z_hop:               5.0       # Lifts the nozzle relative to current position to avoid collisions

# --- Pattern Parameters ---
variable_step:                1.0       # Density of the zigzag line
variable_angle:               45        # Angle of the cleaning movement in degrees (e.g., 45 for diagonal, 90 for straight)
variable_speed:               150       # Base speed for the cleaning moves in mm/s
variable_travel_speed:        350       # Speed for travel moves to/from the brush in mm/s

# --- Execution Logic ---
variable_repeat:              1         # Number of additional cycles (0 = run once, 1 = run twice)
variable_speed_up:            20        # Speed increase for each repeat cycle in mm/s
variable_reverse_enable:      True      # If True, the nozzle cleans from Start->End AND End->Start in one cycle.
variable_return_to_start:     True      # If True, returns the toolhead to the original position after cleaning.
variable_verbose:             False      # Enable console output for debugging path generation

gcode:
    # This section is intentionally left empty.
    # Variables are accessed via printer["gcode_macro _KAMM_Variables"]

[gcode_macro KAMM]
description: Executes the nozzle scrubbing pattern
gcode:
    # --- 1. Load Variables & Parameters ---
    {% set vars = printer["gcode_macro _KAMM_Variables"] %}

    # Retrieve arguments or fall back to configured default variables
    {% set start_x = params.START_X|default(vars.brush_start_x)|float %}
    {% set start_y = params.START_Y|default(vars.brush_start_y)|float %}
    {% set end_x = params.END_X|default(vars.brush_end_x)|float %}
    {% set end_y = params.END_Y|default(vars.brush_end_y)|float %}
    {% set brush_z = params.BRUSH_Z|default(vars.brush_z)|float %}
    {% set z_hop = params.Z_HOP|default(vars.z_hop)|float %}

    {% set step = params.STEP|default(vars.step)|float %}
    {% set angle = params.ANGLE|default(vars.angle)|float %}
    {% set speed = params.SPEED|default(vars.speed)|float * 60 %}
    {% set travel_speed = params.TRAVEL_SPEED|default(vars.travel_speed)|float * 60 %}
    {% set repeats = params.REPEAT|default(vars.repeat)|int %}

    # --- 2. Safety Checks ---
    # Ensure the printer is homed before attempting any moves
    {% if "xyz" not in printer.toolhead.homed_axes %}
        { action_raise_error("KAMM: Printer must be homed before scrubbing!") }
    {% endif %}

    # Save the current gcode state (speed, absolute/relative mode, etc.)
    SAVE_GCODE_STATE NAME=kamm_state

    # Store the position where the macro was triggered
    {% set origin_x = printer.toolhead.position.x %}
    {% set origin_y = printer.toolhead.position.y %}
    {% set origin_z = printer.toolhead.position.z %}

    # --- 3. Geometry & Direction Calculation ---
    # Calculate dimensions and determine the direction of travel (-1 or 1)
    {% set dist_x = end_x - start_x %}
    {% set dist_y = end_y - start_y %}
    {% set width = dist_x|abs %}
    {% set height = dist_y|abs %}

    # Determine Orientation: Horizontal (X-Axis) vs Vertical (Y-Axis)
    {% if width > height %}
        {% set is_horizontal = True %}
        {% set total_steps = (width / step)|int %}
        {% set dir_x = 1 if dist_x > 0 else -1 %}
    {% else %}
        {% set is_horizontal = False %}
        {% set total_steps = (height / step)|int %}
        {% set dir_y = 1 if dist_y > 0 else -1 %}
    {% endif %}

    # Convert angle to radians for trigonometric calculations
    {% set radians = angle * (math.pi / 180) %}

    # --- 4. Path Generation ---
    # Create a list to store all XY coordinates for the wiping pattern
    {% set path_points = [] %}

    {% for i in range(total_steps) %}
        {% set progression = i * step %}

        {% if is_horizontal %}
            # -- Horizontal Brush Logic --
            # Calculate the current X base position
            {% set current_x = start_x + (progression * dir_x) %}

            # Point A: Base position on Start-Y
            {% set p1_x = current_x %}
            {% set p1_y = start_y %}

            # Point B: Opposite Y side + Diagonal Shift (X)
            # Calculates the X-offset required to achieve the desired angle
            {% set x_shift = height / math.tan(radians) if angle != 0 and angle != 90 else 0 %}
            {% set p2_x = current_x + (x_shift * dir_x) %}
            {% set p2_y = end_y %}

            # Point C: Step forward on Start-Y
            {% set p3_x = current_x + (step * dir_x) %}
            {% set p3_y = start_y %}

            # Append points B (Top/Bottom) and C (Step) to the path list
            {% set _ = path_points.append({'x': p2_x, 'y': p2_y}) %}
            {% set _ = path_points.append({'x': p3_x, 'y': p3_y}) %}

        {% else %}
            # -- Vertical Brush Logic --
            # Calculate the current Y base position
            {% set current_y = start_y + (progression * dir_y) %}

            # Point A: Base position on Start-X
            {% set p1_y = current_y %}
            {% set p1_x = start_x %}

            # Point B: Opposite X side + Diagonal Shift (Y)
            {% set y_shift = width / math.tan(radians) if angle != 0 and angle != 90 else 0 %}
            {% set p2_y = current_y + (y_shift * dir_y) %}
            {% set p2_x = end_x %}

            # Point C: Step forward on Start-X
            {% set p3_y = current_y + (step * dir_y) %}
            {% set p3_x = start_x %}

            # Append points to the path list
            {% set _ = path_points.append({'x': p2_x, 'y': p2_y}) %}
            {% set _ = path_points.append({'x': p3_x, 'y': p3_y}) %}
        {% endif %}
    {% endfor %}

    # --- 5. Reverse Logic ---
    # If enabled, duplicate the path in reverse order to create a full loop
    {% if vars.reverse_enable %}
        {% set path_reversed = path_points[:] %}
        {% set _ = path_reversed.reverse() %}
        {% set _ = path_points.extend(path_reversed) %}
    {% endif %}

    # ==========================================
    # 6. Motion Execution
    # ==========================================

    {% if vars.verbose %}
        { action_respond_info("KAMM: Starting pattern. Total points: %d" % path_points|length) }
    {% endif %}

    # 1. Z-HOP (Relative Lift) to avoid collisions
    G91
    G0 Z{z_hop} F3000
    G90

    # 2. Travel to Start Point
    G0 X{start_x} Y{start_y} F{travel_speed}

    # 3. Approach Brush (Absolute Z)
    # Only move Z if a specific height is defined (Bed mounted brushes).
    # If 0, we stay at the hopped height (useful for Gantry mounts).
    {% if brush_z > 0 %}
        G0 Z{brush_z} F3000
    {% endif %}

    # 4. Pattern Repeats
    {% for r in range(repeats + 1) %}
        # Calculate speed for current iteration (Base Speed + Speed Up * Iteration)
        {% set current_f = speed + (r * vars.speed_up * 60) %}

        # Iterate through the calculated path points
        {% for point in path_points %}
            G1 X{point.x} Y{point.y} F{current_f}
        {% endfor %}

        # Return Logic for Non-Reverse mode:
        # If reverse is disabled, we are at the end of the brush.
        # We must travel back to start for the next repeat cycle.
        {% if not vars.reverse_enable and r < repeats %}
            G0 X{start_x} Y{start_y} F{travel_speed}
        {% endif %}

    {% endfor %}

    # 5. Exit Z-Move
    G91
    G0 Z{z_hop} F3000
    G90

    # 6. Return to Start
    {% if vars.return_to_start %}
        G0 X{origin_x} Y{origin_y} Z{origin_z} F{travel_speed}
    {% endif %}

    RESTORE_GCODE_STATE NAME=kamm_state