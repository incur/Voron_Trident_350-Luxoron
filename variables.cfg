#---------------------------------#
#       Macro Settings            #
#---------------------------------#
[gcode_macro _SELF_VARIABLES]

# Printer
variable_verbose_enable: True
variable_custom_park_dz: 20
variable_fix_heaters_temperature_settle: True
variable_travel_speed: 500
variable_z_drop_speed: 15
variable_park_lift_z: 150
variable_park_position_xy: 10, 350
variable_print_default_extruder_temp: 215

# LEDs
variable_status_leds_caselight_enabled: False
variable_status_leds_effects_enabled: False
variable_status_leds_enabled: True
variable_status_leds_logo_idx: '1'
variable_status_leds_logo_led_name: "status_leds"
variable_status_leds_nozzle_idx: '2,3'
variable_status_leds_nozzle_led_name: "status_leds"

# Caselight
variable_light_enabled: True
variable_light_intensity_end_print: 100
variable_light_intensity_printing: 30
variable_light_intensity_start_print: 100

# not in use
variable_homing_travel_accel: 10000
variable_homing_travel_speed: 500
variable_homing_zhop: 5

gcode:

#---------------------------------#
#       Mainsail Settings         #
#---------------------------------#

[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos   : False ; use custom park coordinates for x,y [True/False]
variable_custom_park_x    : 10.0   ; custom x position; value must be within your defined min and max of X
variable_custom_park_y    : 10.0   ; custom y position; value must be within your defined min and max of Y
variable_custom_park_dz   : 2.0   ; custom dz value; the value in mm to lift the nozzle when move to park position
variable_retract          : 1.0   ; the value to retract while PAUSE
variable_cancel_retract   : 5.0   ; the value to retract while CANCEL_PRINT
variable_speed_retract    : 35.0  ; retract speed in mm/s
variable_unretract        : 1.0   ; the value to unretract while RESUME
variable_speed_unretract  : 35.0  ; unretract speed in mm/s
variable_speed_hop        : 60.0  ; z move speed in mm/s
variable_speed_move       : 333.0 ; move speed in mm/s
variable_park_at_cancel   : True ; allow to move the toolhead to park while execute CANCEL_PRINT [True/False]
variable_park_at_cancel_x : 10.0  ; different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
variable_park_at_cancel_y : 350.0  ; different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
# !!! Caution [firmware_retraction] must be defined in the printer.cfg if you set use_fw_retract: True !!!
variable_use_fw_retract   : False ; use fw_retraction instead of the manual version [True/False]
variable_idle_timeout     : 0     ; time in sec until idle_timeout kicks in. Value 0 means that no value will be set or restored
variable_runout_sensor    : "filament_switch_sensor runout_sensor"    ; If a sensor is defined, it will be used to cancel the execution of RESUME in case no filament is detected.
#                                   Specify the config name of the runout sensor e.g "filament_switch_sensor runout". Hint use the same as in your printer.cfg
# !!! Custom macros, please use with care and review the section of the corresponding macro.
# These macros are for simple operations like setting a status LED. Please make sure your macro does not interfere with the basic macro functions.
# Only  single line commands are supported, please create a macro if you need more than one command.
variable_user_pause_macro : "SET_FILAMENT_SENSOR SENSOR=runout_sensor ENABLE=0"    ; Everything inside the "" will be executed after the klipper base pause (PAUSE_BASE) function
variable_user_resume_macro: "SET_FILAMENT_SENSOR SENSOR=runout_sensor ENABLE=1"    ; Everything inside the "" will be executed before the klipper base resume (RESUME_BASE) function
variable_user_cancel_macro: "SET_FILAMENT_SENSOR SENSOR=runout_sensor ENABLE=0"    ; Everything inside the "" will be executed before the klipper base cancel (CANCEL_PRINT_BASE) function
gcode:

#---------------------------------#
#       KAMP Settings             #
#---------------------------------#
[gcode_macro _KAMP_Settings]
variable_verbose_enable: True               # Set to True to enable KAMP information output when running. This is useful for debugging.

# The following variables are for adjusting adaptive purge settings for KAMP.
variable_purge_height: 1.2 # 0.9            # Z position of nozzle during purge, default is 0.8.
variable_tip_distance: 5                    # Distance between tip of filament and nozzle before purge. Should be similar to PRINT_END final retract amount.
variable_purge_margin: 20                   # Distance the purge will be in front of the print area, default is 10.
variable_purge_amount: 30                   # Amount of filament to be purged prior to printing.
variable_flow_rate: 8                      # Flow rate of purge in mm3/s. Default is 12.

# The following variables are for adjusting the Smart Park feature for KAMP, which will park the printhead near the print area at a specified height.
variable_smart_park_height: 5              # Z position for Smart Park, default is 10.
gcode:

#---------------------------------#
#       KOMB Settings             #
#---------------------------------#

[gcode_macro _KOMB_Variables]
description: User Variables for Nozzle_Brush macro

variable_verbose_enable:        True      # Enable verbose console output
variable_verbose_points:        False      # Set to true to display all generated points

variable_brush_location_x:      33        # X absolute location for bottom left corner of brush
variable_brush_location_y:      349       # Y absolute location for bottom left corner of brush. Set to 0 for x gantry mounted brush
variable_brush_location_z:      0         # Z absolute location for bottom left corner of brush, set to the point of the minimum depth or height you want brushing to occur at, Set to 0 for gantry mounted brush
variable_brush_size_x:          36        # Size of brush in mm on x_axis, set to 0 for straight horizontal movement, y must have a value
variable_brush_size_y:          8         # Size of brush in mm on y_axis, set to 0 for straight horizontal movement, x must have a value
variable_brush_size_z:          0         # Depth of brush in mm. Measure to ensure nozzle doesn't dip too far. Should be set to max distance you want to allow nozzle to lower
variable_z_hop_height:          0         # Relative height to raise nozzle to before lowering to brush, and how high above current pos to raise again. Set to 0 to disable Set to 0 to disable (not recommended to use a value less than 2)
variable_step:                  1         # Distance in mm between strokes, doesn't apply if using horizontal strokes. Must be set to a minimum of 1
variable_z_step:                0         # When using repeat, will lower the nozzle to the lowest point in this number of steps in mm after each iteration. Set to 0 to disable
variable_offset:                0         # Distance in mm to offset starting and ending strokes, use if you want nozzle strokes to start and end further from the brush. If offset goes outside bounds macro will automatically adjust to be within.
variable_repeat:                0         # Number of times to repeat the sequence
variable_reverse_enable:        True     # Repeat same pattern back in reverse when nozzle reaches other size of brush
variable_speed:                 150       # Speed between brush strokes. Set in mm/s.
variable_speed_up:              10        # When using repeat, increase or decrease the speed by this amount for each iteration.  Set in mm/s.
variable_travel_speed:          350       # Speed for travel move to brush location. Set in mm/s.
variable_pattern:               1         # Pattern number. 1: Diagonals. 2: Circles
variable_angle:                 45        # Specify angle in degrees for diagonal movements with Pattern 1. Default is 45
variable_start_opposite_side:   True     # Start from opposite side
variable_start_adjacent_side:   False     # Move across the y axis instead of x. Or move along a vertical path instead of horizontal
variable_auto_home_enable:      False      # Automatically home printer if it isn't already
variable_clean_while_cold:      True      # Allow nozzle cleaning while nozzle is cold. Set to false to only allow cleaning while hot
variable_auto_heat_nozzle:      False     # Automatically heat nozzle before brushing if nozzle is cold and clean while cold set to False
variable_retract_before_wipe:   0         # Retract filament Xmm before starting brushing sequence when heated, set to 0 to disable,
variable_retract_during_wipe:   0         # Retracts filament Xmm between brush strokes when heated, set to 0 to disable
variable_retract_after_wipe:    0         # Retract filament Xmm after brushing when heated, set to 0 to disable
variable_temp:                  175       # Minimum temperature to allow brushing at, will also be heated to this temp if using Auto Heat
variable_purge_location_x:      80        # Location of purge bucket on X axis
variable_purge_location_y:      355       # Location of purge bucket on Y axis
variable_purge_location_z:      5         # Location of purge bucket on Z axis
variable_purge_amount:          0        # Amount in mm of filament to purge before starting brushing sequence. Set to 0 to disable
variable_purge_speed:           10        # Flow rate of purge in mm3/s. Default is 20.
variable_wait_time:             5         # Amount of time in seconds to wait after purging before making next move
variable_return_to_start:       True      # Automatically return to starting position after brushing. Must be enabled to use KOMB trigger
variable_trigger_freq:          0         # Specify how often you want the printer to automatically brush the nozzle. Add "KOMB_trigger" to your 'at every layer change' section in your slicer. 
                                          # It is not advisable to use Trigger with per object printing, or with brushes mounted to bed on bed-slinger printers. Use at your own risk. Return to start must be enabled
gcode: 
    { action_respond_info(" Running the KOMB_Variables macro does nothing, it is only used for storing settings :) ") }

#---------------------------------#
#       FORM TIP Settings         #
#---------------------------------#
[gcode_macro _FORM_TIP_VARS]
description: Happy Hare tip forming macro configuration variables
gcode:

# Step 1 - Ramming
# Ramming is the initial squeeze of filament prior to cooling moves and is
# described in terms of total volume and progression of squeeze intensity
# printing/standalone. This can be separately controlled when printing or
# standalone
variable_ramming_volume            : 13		; Volume in mm^3, 0 = disabled (optionally let slicer do it)
# variable_ramming_volume_standalone : 0		; Volume in mm^3, 0 = disabled

# Optionally set for temperature change (reduction). The wait will occur
# before nozzle separation if 'use_fast_skinnydip: False' else after cooling
# moves. Temperature will be restored after tip creation is complete
variable_toolchange_temp        : 0		; 0 = don't change temp, else temp to set
# variable_toolchange_fan_assist  : False		; Whether to use part cooling fan for quicker temp change
# variable_toolchange_fan_name    : ''		; Define the part fan name if not default [fan] e.g "fan_generic fan0"
variable_toolchange_fan_speed   : 50		; Fan speed % if using fan_assist enabled

# Step 2 - Nozzle Separation
# The filament is then quickly separated from the meltzone by a fast movement
# before then slowing to travel the remaining distance to cooling tube. The
# initial fast movement should be as fast as extruder can comfortably perform.
# A good starting point# for slower move is unloading_speed_start/cooling_moves.
# Too fast a slower movement can lead to excessively long tips or hairs
variable_unloading_speed_start  : 50		; Speed in mm/s for initial fast movement
variable_unloading_speed        : 20		; Speed in mm/s for slow move to cooling zone

# Step 3 - Cooling Moves
# The cooling move allows the filament to harden while constantly moving back
# and forth in the cooling tube portion of the extruder to prevent a bulbous
# tip forming. The cooling tube position is measured from the internal nozzle
# to just past the top of the heater block (often it is beneficial to add a
# couple of mm to ensure the tip is in the cooling section. The cooling tube
# length is then the distance from here to top of heatsink (this is the length
# length of the cooling moves). The final cooling move is a fast movement to
# break the string formed.
variable_cooling_tube_position  : 30		; Start of cooling tube. DragonST:35, DragonHF:30, Mosquito:30, Revo:35, RapidoHF:27
variable_cooling_tube_length    : 15		; Movement length. DragonST:15, DragonHF:10, Mosquito:20, Revo:10, RapidoHF:10
variable_initial_cooling_speed  : 3		; Initial slow movement (mm/s) to solidify tip and cool string if formed
variable_final_cooling_speed    : 2		; Fast movement (mm/s) Too fast: tip deformation on eject, Too Slow: long string/no separation
variable_cooling_moves          : 2		; Number of back and forth cooling moves to make (2-4 is a good start)

# Step 4 - Skinnydip
# Skinnydip is an advanced final move that may have benefit with some
# material like PLA to burn off persistent very fine hairs. To work the
# depth of insertion is critical (start with it disabled and tune last)
# For reference the internal nozzle would be at a distance of
# cooling_tube_position + cooling_tube_length, the top of the heater
# block would be cooling_tube_length away.
variable_use_skinnydip          : True		; True = enable skinnydip, False = skinnydip move disabled
variable_skinnydip_distance     : 30		; Distance to reinsert filament into hotend starting from end of cooling tube
variable_dip_insertion_speed    : 30		; Medium/Slow insertion speed mm/s - Just long enough to melt the fine hairs, too slow will pull up molten filament
variable_dip_extraction_speed   : 70		; Speed mm/s - Around 2x Insertion speed to prevents forming new hairs
variable_melt_zone_pause        : 0		; Pause if melt zone in ms. Default 0
variable_cooling_zone_pause     : 0		; Pause if cooling zone after dip in ms. Default 0
variable_use_fast_skinnydip     : False		; False = Skip the toolhead temp change wait during skinnydip move

# Step 5 - Parking
# Park filament ready to eject
# variable_parking_distance       : 0		; Position mm to park the filament at end of tip forming, 0 = leave where filament ends up after tip forming
variable_extruder_eject_speed   : 25		; Speed mm/s used for parking_distance (and final_eject when testing)

